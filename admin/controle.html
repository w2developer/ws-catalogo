<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ws For Men - Controle</title>
    <link rel="shortcut icon" href="/assets/svg/WS_Branco.svg" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (async () => {
            // Configurações do Supabase
            const supabaseUrl = 'https://qglslyrlxxevqeagghvd.supabase.co'
            const supabaseKey = 'sb_publishable_oeJQrZAL6anvLtFxu5S5tA_LtaIKrvc'

            // Inicializa o cliente
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

            // Busca a sessão atual salva localmente
            const { data: { session } } = await supabaseClient.auth.getSession()

            // Se não houver sessão ativa, redireciona para a página de login
            if (!session) {
                window.location.href = 'index.html' // Altere para o nome do seu arquivo de login
            }
        })()
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="/styles/sty-product-list.css">
    <link rel="stylesheet" href="/styles/sty-modal-produto.css">

    <!-- Remixicon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Google Fontes ! Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <!-- Supabase -->
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
    <div class="header-menu">
        <nav>
            <a href="./controle.html">
                <img src="/assets/svg/WS_Branco.svg" alt="Logo da Ws For Men">
            </a>
            <ul>
                <li><a href="">Controle</a></li>
                <li><a href="./galeria.html">Galeria</a></li>
                <li><a href="./tags.html">Tags</a></li>
            </ul>
            <button id="logout-btn" style="cursor: pointer; padding: .1rem; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; background: transparent; border: none; outline: none; color: #ffffff;">
                <i class="ri-logout-box-line"></i>
            </button>
        </nav>
    </div>
    <div class="container">
        <header>
            <h1>Painel de Controle</h1>
        </header>

        <button class="btn-novo-produto btn-success" onclick="abrirModalCadastro()">Novo Produto</button>

        <main id="catalog-content"></main>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="imgFull" alt="" onclick="event.stopPropagation()">
    </div>


    <div id="modalProduto" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="titulo-modal">Cadastrar Produto</h2>
                <button class="btn btn-danger" style="padding:5px 10px;" onclick="fecharModal()">X</button>
            </div>
            
            <form id="formProduto">
                <input type="hidden" id="prod_id">

                <div class="form-group">
                    <label for="nome">Nome do Produto *</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="setor_id">Setor *</label>
                        <select id="setor_id" onchange="aoMudarSetor()" required>
                            </select>
                    </div>
                    <div class="form-group">
                        <label for="categoria_id">Categoria *</label>
                        <select id="categoria_id" required disabled>
                            <option value="">Selecione um setor primeiro...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="marca_id">Marca *</label>
                        <select id="marca_id" required disabled>
                            <option value="">Selecione um setor primeiro...</option>
                        </select>
                    </div>
                </div>

                <div id="camposEletronicos" class="form-row hidden">
                    <div class="form-group">
                        <label for="lacrado">Lacrado</label>
                        <select id="lacrado">
                            <option value="">Selecione...</option>
                            <option value="Sim">Sim</option>
                            <option value="Não">Não</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="condicao">Condição</label>
                        <select id="condicao">
                            <option value="">Selecione...</option>
                            <option value="Novo">Novo</option>
                            <option value="Semi Novo">Semi Novo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bateria_percent">Bateria (%)</label>
                        <input type="number" id="bateria_percent" min="0" max="100">
                    </div>
                </div>

                <div id="camposRoupas" class="form-group hidden">
                    <label for="tamanho">Tamanho</label>
                    <input type="text" id="tamanho" placeholder="Ex: P, M, G, 42">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cor">Cor</label>
                        <input type="text" id="cor">
                    </div>
                    <div class="form-group">
                        <label for="disponibilidade">Disponibilidade</label>
                        <select id="disponibilidade" required>
                            <option value="Disponível">Disponível</option>
                            <option value="Indisponível">Indisponível</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="url_imagem">URL da Imagem</label>
                    <input type="text" id="url_imagem" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" rows="3"></textarea>
                </div>

                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px;">
                    <button type="button" class="btn btn-danger" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn btn-success">Salvar</button>
                </div>
            </form>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="/scripts/script-controle.js"></script>
<script>
    (async () => {
        const supabaseUrl = 'https://qglslyrlxxevqeagghvd.supabase.co'
        const supabaseKey = 'sb_publishable_oeJQrZAL6anvLtFxu5S5tA_LtaIKrvc'

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

        const { data: { session } } = await supabaseClient.auth.getSession()

        if (!session) {
            window.location.href = './login.html'
            return
        }

        const logoutBtn = document.getElementById('logout-btn')
        
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                await supabaseClient.auth.signOut()
                window.location.href = './login.html'
            })
        }
    })()
</script>
</body>
</html>
