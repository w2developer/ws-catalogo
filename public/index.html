<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ws For Men - Catálogo</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- Remixicon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Google Fontes ! Popins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="./assets/WS_Branco.svg" alt="Logo Ws For Men">
            </div>
            <nav class="nav-desktop">
                <ul class="menu">
                    <li><a href="#moda" class="active">Moda</a></li>
                    <li><a href="#eletronicos">Eletrônico</a></li>
                    <li><a href="#sobre">Sobre</a></li>
                </ul>
            </nav>
            <div class="search-box">
                <input id="search" type="text" placeholder="Pesquisar" autocomplete="off">
            </div>
            <div class="menu-toggle">
                <i class="ri-menu-line"></i>
            </div>
        </div>
        <div class="off-canvas-mobile-menu">
            <ul>
                <li><a href="#moda" class="active">Moda</a></li>
                <li><a href="#eletronicos">Eletrônico</a></li>
                <li><a href="#sobre">Sobre</a></li>
            </ul>
        </div>
    </header>
    <section class="section product"></section>

    <section>
        
    </section>
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="imgFull" alt="">
    </div>
<script src="./scripts/off-canvas-mobile-menu.js"></script>
    <script>
        // Abre o modal com a imagem clicada
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('imgFull');
            modal.classList.add('active');
            modalImg.src = src;
        }

        // Fecha o modal
        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        // Fecha se apertar a tecla Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
<script src="./scripts/lista-produtos.js"></script>
</body>
</html>
